name: BHVA Contacts Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"   # Runs daily at 3 AM

jobs:
  sync:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Playwright
      shell: pwsh
      run: |
        Install-Module -Name Microsoft.Playwright -Force
        playwright install

    - name: Run BHVA Contacts Sync
      shell: pwsh
      env:
        HOTMAIL_USERNAME: ${{ secrets.HOTMAIL_USERNAME }}
        HOTMAIL_PASSWORD: ${{ secrets.HOTMAIL_PASSWORD }}
        HOTMAIL_TOTP_SECRET: ${{ secrets.HOTMAIL_TOTP_SECRET }}
        CLIENT_ID: ${{ secrets.CLIENT_ID }}
        CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        TENANT_ID: ${{ secrets.TENANT_ID }}
      run: |
        pwsh "./BHVA Contacts Sync.ps1"
