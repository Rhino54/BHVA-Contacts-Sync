name: BHVA Contacts Sync

on:
  workflow_dispatch:

jobs:
  run-sync:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # ============================
    # Install Microsoft Graph PowerShell module
    # ============================
    - name: Install Microsoft Graph PowerShell module
      shell: pwsh
      run: |
        if (-not (Get-Module -ListAvailable -Name Microsoft.Graph)) {
            Install-Module Microsoft.Graph -Force -Scope CurrentUser -AllowClobber -RequiredVersion 2.0.0
        }

    # ============================
    # Run your sync script
    # ============================
    - name: Run BHVA Contacts Sync script
      shell: pwsh
      run: pwsh "./BHVA Contacts Sync.ps1"
      env:
        GRAPH_TENANT_ID: ${{ secrets.GRAPH_TENANT_ID }}
        GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
        GRAPH_CLIENT_SECRET: ${{ secrets.GRAPH_CLIENT_SECRET }}
        HOTMAIL_IMAP_USERNAME: ${{ secrets.HOTMAIL_IMAP_USERNAME }}
        HOTMAIL_IMAP_PASSWORD: ${{ secrets.HOTMAIL_IMAP_PASSWORD }}
