name: BHVA Contacts Sync

on:
  workflow_dispatch:

jobs:
  run-sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # ============================
    # Cache Microsoft Graph PowerShell module
    # ============================
    - name: Cache Microsoft Graph module
      uses: actions/cache@v4
      with:
        path: |
          ~/.local/share/powershell/Modules
        key: graph-cache

    # ============================
    # Install Microsoft Graph PowerShell module (fast)
    # ============================
    - name: Install Microsoft Graph PowerShell module
      shell: pwsh
      run: |
        if (-not (Get-Module -ListAvailable -Name Microsoft.Graph)) {
            Install-Module Microsoft.Graph -Force -Scope CurrentUser
        }

    # ============================
    # Run your sync script
    # ============================
    - name: Run BHVA Contacts Sync script
      shell: pwsh
      run: pwsh "./BHVA Contacts Sync.ps1"
      env:
        GRAPH_TENANT_ID: ${{ secrets.GRAPH_TENANT_ID }}
        GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
        GRAPH_CLIENT_SECRET: ${{ secrets.GRAPH_CLIENT_SECRET }}
